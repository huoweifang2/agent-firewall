# Agent-Firewall — Docker Compose
#
# Quick start:
#   make up      → full stack (real LLM)
#   make dev     → infra only (apps run locally)

services:
  # ── PostgreSQL + pgvector ─────────────────────────────
  db:
    build:
      context: .
      dockerfile: db.Dockerfile
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agent_firewall}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - agent-firewall

  # ── Redis ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - agent-firewall

  # ── Langfuse ──────────────────────────────────────────
  # Pinned to v2 — v3 requires ClickHouse + MinIO (overkill for local dev)
  langfuse:
    image: langfuse/langfuse:2
    profiles: ["full"]
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/langfuse
      NEXTAUTH_URL: http://localhost:3001
      NEXTAUTH_SECRET: local-dev-secret
      SALT: local-dev-salt
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/public/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    networks:
      - agent-firewall

  # ── App Services ───────────────────────────────────────
  proxy-service:
    build:
      context: ../apps/proxy-service
    profiles: ["full"]
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    environment:
      MODE: ${MODE:-demo}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://postgres:postgres@db:5432/agent_firewall}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      DEFAULT_POLICY: ${DEFAULT_POLICY:-balanced}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      OPENCLAW_BIN: ${OPENCLAW_BIN:-openclaw}
      OPENCLAW_TIMEOUT_SECONDS: ${OPENCLAW_TIMEOUT_SECONDS:-120}
      OPENCLAW_PLUGIN_STAGE_DIR: ${OPENCLAW_PLUGIN_STAGE_DIR:-/tmp/agent-firewall-openclaw-plugin-runtime-deps}
      BENCHMARK_SECRET_KEY: ${BENCHMARK_SECRET_KEY:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - agent-firewall

  agent:
    build:
      context: ../apps/agent
    profiles: ["full"]
    env_file:
      - ../apps/agent/.env
    ports:
      - "8002:8002"
    environment:
      PROXY_BASE_URL: http://proxy-service:8000/v1
      AGENT_ID: ${AGENT_ID_AGENT:-}
      DEFAULT_MODEL: deepseek-chat
      DEFAULT_MODEL_PREFIX: deepseek
      DEFAULT_POLICY: balanced
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      OPENCLAW_BIN: ${OPENCLAW_BIN:-openclaw}
      OPENCLAW_AGENT_ID: ${OPENCLAW_AGENT_ID:-coder}
      OPENCLAW_TIMEOUT_SECONDS: ${OPENCLAW_TIMEOUT_SECONDS:-120}
      OPENCLAW_AGENT_LOCAL: ${OPENCLAW_AGENT_LOCAL:-false}
      OPENCLAW_PLUGIN_STAGE_DIR: ${OPENCLAW_PLUGIN_STAGE_DIR:-/tmp/agent-firewall-openclaw-plugin-runtime-deps}
      LITELLM_LOG_LEVEL: ERROR
      MODE: ${MODE:-demo}
    depends_on:
      - proxy-service
    networks:
      - agent-firewall

  frontend:
    build:
      context: ../apps/frontend
    profiles: ["full"]
    ports:
      - "3000:3000"
    environment:
      # Client-side (browser) → calls host machine ports
      NUXT_PUBLIC_API_BASE: http://localhost:8000
      NUXT_PUBLIC_AGENT_API_BASE: http://localhost:8002
      NUXT_PUBLIC_REFERENCE_CHAT_TARGET_URL: http://localhost:8010
    depends_on:
      - proxy-service
      - agent
    networks:
      - agent-firewall

  # ── Reference Chat Target ─────────────────────────────
  reference-chat-target:
    build:
      context: ../apps/reference-chat-target
    profiles: ["demo", "full"]
    ports:
      - "8010:8010"
    env_file:
      - path: ../apps/reference-chat-target/.env
        required: false
    environment:
      AGENT_FIREWALL_BASE_URL: http://proxy-service:8000
      PORT: "8010"
    depends_on:
      - proxy-service
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8010/health')\""]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - agent-firewall

volumes:
  pgdata:

networks:
  agent-firewall:
    driver: bridge
